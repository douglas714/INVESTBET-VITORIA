# Netlify Configuration for INVESTBET (Remote Access Mode)

[build]
  # Comando de build - apenas o frontend
  command = "pnpm install && pnpm build"
  
  # Diretório de saída
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22.13.0"
  NPM_VERSION = "10.15.1"

# REGRAS DE REDIRECIONAMENTO (IMPORTANTE)
# Substitua SEU_ENDERECO_NGROK pelo endereço que o Ngrok fornecer no seu PC.
# Exemplo: https://meu-robo.ngrok-free.app

[[redirects]]
  from = "/api/trpc/*"
  to = "https://SEU_ENDERECO_NGROK.ngrok-free.app/api/trpc/:splat"
  status = 200
  force = true

# Reescrita de URL para SPA (Fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de segurança e CORS
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
